name: 🌙 Mise à jour complète du profil

on:
    schedule:
        # Tous les dimanches à 3h UTC
        - cron: "0 3 * * 0"
    workflow_dispatch: # Permet de déclencher manuellement

jobs:
    update-complete:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: 📥 Checkout repository
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: 🐍 Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: 📦 Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: 🔍 Découvrir les projets
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  python update-profile.py --export config/projects-data.json

            - name: 📝 Mettre à jour le README
              run: |
                  python auto-update-readme.py

            - name: 🔍 Auditer les projets
              run: |
                  python scripts/audit-projects.py --output audits/AUDIT-COMPLET-PROJETS.md
              continue-on-error: true

            - name: 📊 Mettre à jour les métriques
              run: |
                  python scripts/update_readme_metrics.py
              continue-on-error: true

            - name: 📤 Commit et push
              if: github.event_name != 'pull_request'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add config/projects-data.json README.md audits/AUDIT-COMPLET-PROJETS.md metrics/ scripts/update_readme_metrics.py 2>/dev/null || true
                  git diff --staged --quiet || git commit -m "🌙 Mise à jour complète automatique [skip ci]"
                  git push || echo "No changes to commit"
